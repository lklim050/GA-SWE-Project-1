<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="cover-page" class="screen">
      <h1 class="game-title">FANTASTIC RPG</h1>
      <button id="start-game-btn" class="pixel-btn">START GAME</button>
    </div>

    <div id="char-selection" class="screen hidden">
      <h2>CHOOSE YOUR HERO</h2>
      <div class="char-grid">
        <div class="char-card" data-class="Warrior">
          <img src="warrior_back_45.png" alt="Warrior" />
          <p>Warrior</p>
        </div>
        <div class="char-card" data-class="Mage">
          <img src="mage_back_45.png" alt="Mage" />
          <p>Mage</p>
        </div>
      </div>
    </div>

    <div class="game-container">
      <div class="zone enemy-hand" id="enemy-hand-container">
        <div class="enemy-face">"_"</div>
      </div>

      <div class="zone enemy">
        <div class="enemy-text">Enemy, Class: ????, HP: ??/??, ATK: ??</div>
      </div>

      <div class="middle-row">
        <div class="zone discard-pile">
          <h3>Discard</h3>
          <div class="card-slot" id="discard"></div>
          <h3 class="discard-count"></h3>
        </div>

        <div class="zone play-area">
          <div class="active-enemy"></div>
          <div id="dialogue-box">Game Started: Player X's Turn</div>
          <div class="active-player"></div>
        </div>

        <div class="zone deck-pile">
          <h3>Deck</h3>
          <div class="card-back card-back-hidden" id="draw-deck"></div>
          <h3 class="deck-count"></h3>
        </div>
      </div>

      <div class="zone player">
        <div class="player-text">Player, Class: ????, HP: ??/??, ATK: ??</div>
      </div>

      <div class="zone player-hand" id="player-hand-container">
        <div class="player-face">^_^</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
